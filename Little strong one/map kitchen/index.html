<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Level 2: The Spacious Kitchen</title>
<style>
    body {
        background-color: #080808;
        color: #ccc;
        font-family: 'Courier New', Courier, monospace;
        margin: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        touch-action: none; /* Prevent browser zooming/scrolling */
    }

    #game-wrapper {
        position: relative;
        transform-origin: top center;
        transition: transform 0.2s;
    }

    #game-container {
        position: relative;
        border: 4px solid #333;
        padding: 10px;
        background: #111;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        width: fit-content;
    }

    pre {
        margin: 0;
        font-weight: bold;
        cursor: default;
        user-select: none;
        white-space: pre;
        font-size: 14px;
        line-height: 14px;
    }

    #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: #000;
        border-bottom: 2px solid #444;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        z-index: 100;
        font-size: 16px;
        font-weight: bold;
        box-sizing: border-box;
    }

    .stat-box { color: #888; }
    .stat-box span { color: #fff; }
    .stat-box.danger span { color: #ff3300; animation: blink 0.5s infinite; }
    .stat-box.safe span { color: #00ccff; }
    
    @keyframes blink { 50% { opacity: 0.5; } }

    /* --- ANIMATIONS & ASSETS --- */

    .fire { display: inline-block; font-weight: bold; }
    .fire::after { content: "  ▲▲  "; animation: fireAnim 0.4s infinite steps(1); }
    @keyframes fireAnim {
        0%   { content: "[  ▲▲  ]"; color: #ff8800; text-shadow: 0 0 5px #ff4400; }
        33%  { content: "[ ▲▲▲▲ ]"; color: #ff4400; text-shadow: 0 0 8px #ff0000; }
        66%  { content: "[  ▲▲  ]"; color: #ffcc00; text-shadow: 0 0 5px #ff8800; }
    }

    .gas { display: inline-block; font-weight: bold; }
    .gas::after { content: "[≈≈≈≈≈≈≈≈≈≈≈]"; animation: gasAnim 1.5s infinite steps(1); }
    @keyframes gasAnim {
        0%   { content: "[≈≈≈≈≈≈≈≈≈≈≈]"; color: #0088ff; text-shadow: 0 0 2px #0088ff; }
        50%  { content: "[ ≈≈≈≈≈≈≈≈≈ ]"; color: #00ccff; text-shadow: 0 0 4px #00ccff; }
    }

    .heat { display: inline-block; font-weight: bold; }
    .heat::after { content: "[▒▒▒▒▒▒▒]"; animation: heatAnim 2s infinite alternate; }
    @keyframes heatAnim {
        0%   { content: "[▒▒▒▒▒▒▒]"; color: #550000; }
        100% { content: "[███████]"; color: #ff0000; text-shadow: 0 0 10px #aa0000; }
    }

    .chop { display: inline-block; color: #ccc; animation: chopAnim 0.15s infinite alternate; }
    @keyframes chopAnim {
        0% { transform: translateY(0); }
        100% { transform: translateY(-2px); }
    }

    .sauce-anim { display: inline-block; font-weight: bold; animation: sauceAnim 1.5s infinite; }
    @keyframes sauceAnim {
        0% { color: #800; text-shadow: none; }
        50% { color: #f00; text-shadow: 0 0 8px red; }
        100% { color: #800; text-shadow: none; }
    }

    .smoke-anim { display: inline-block; color: #888; animation: smokeFloat 2.5s infinite linear; }
    @keyframes smokeFloat {
        0% { opacity: 0.2; transform: translateY(0); text-shadow: 0 0 0 #fff; }
        50% { opacity: 0.6; transform: translateY(-2px); text-shadow: 0 -2px 4px #fff; }
        100% { opacity: 0.0; transform: translateY(-5px); text-shadow: 0 -4px 8px #fff; }
    }

    .water-leak { display: inline-block; width: 15ch; color: #4af; font-weight: bold; vertical-align: top; }
    .water-leak::after { content: "( ~~~ ~~~ ~~~ )"; animation: waterFlow 1.0s infinite steps(1); }
    @keyframes waterFlow {
        0%   { content: "( ~~~ ~~~ ~~~ )"; color: #4af; }
        25%  { content: "(  ~   ~   ~  )"; color: #4ee; text-shadow: 0 0 5px #0ff; }
        50%  { content: "( ~ ~ ~ ~ ~ ~ )"; color: #4af; }
        75%  { content: "(~~  ~~  ~~  ~)"; color: #4ee; text-shadow: 0 0 5px #0ff; }
    }

    .drain-pipe { display: inline-block; color: #4af; font-weight: bold; text-shadow: 0 0 5px blue; animation: pipeFlow 1.5s infinite linear; }
    @keyframes pipeFlow {
        0% { opacity: 0.4; color: #4af; }
        50% { opacity: 1; color: #aff; text-shadow: 0 0 8px cyan; }
        100% { opacity: 0.4; color: #4af; }
    }

    /* Colors */
    .wall    { color: #444; }
    .floor   { color: #222; }
    .metal   { color: #889; }
    .food    { color: #dd8; }
    .veg     { color: #4f4; }
    .meat    { color: #f44; }
    .water   { color: #4af; }
    .zone    { color: #888; font-style: italic; }
    .npc     { color: #fff; font-weight: bold; background: #333; }
    .bottle  { color: #ff0; text-shadow: 0 0 3px #ff8800; font-weight: bold; }
    .hook    { color: #555; }
    .void    { color: #000; background-color: #000; }
    
    /* Entities */
    .player  { color: #0f0; background-color: #003300; font-weight: 900; box-shadow: 0 0 5px #0f0; }

</style>
</head>
<body>

<div id="ui-layer">
    <div class="stat-box">LEVEL: <span id="lvl-display">2</span></div>
    <div class="stat-box">GRIT: <span id="grit-display">40</span></div>
    <div class="stat-box">STATUS: <span id="status-display">SNEAKING</span></div>
</div>

<div id="game-wrapper">
    <div id="game-container">
        <pre id="game-stage"></pre>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const TICK_RATE = 150; 
const MOVE_COST_RATE = 3; 
const START_GRIT = 40;

// Note: Double backslashes \\ are needed for JS strings
const rawMap = [
"                          ||                                                                       ",
"                          ||                                                                       ",
"+-------------------------||-----------------------------------------------------------------------+",
"|    (WALK-IN FRIDGE)     ||                        (DRY STORAGE WAREHOUSE)                        |",
"|    +----------------+   ||   +---------------------------------------------------------------+   |",
"|    |  ?   ?   ?     |   ||   |                           mmm        mmm          mmm         |   |",
"|    |  |   |   |     |   ||   |    __         __         )-(        )-(          )-(          |   |",
"|    | (S) (S) (S)    |   ||   |   (  )       (  )       (   )      (   )        (   )         |   |",
"|    | (S) (S) (S)    |   ||   |   (__)       (__)       |   |      |   |        |   |         |   |",
"|    |  U   U   U     |   ||   |   (  )       (  )       |   |      |   |        |   |         |   |",
"|    | [|^^|]  [(@)]  |   ||   |   (__)       (__)       |___|      |___|        |___|         |   |",
"|    | [====]  [===]  |   ||   |   (____)     (____)     [|X|]      [|/|]      (oooo)      |   |",
"|    |                |   ||   |===============================================================|   |",
"|    |      _   ____  |   ||   |                                                               |   |",
"|    |     (_) (____) |   ||   |                        )_(        _[_]_                       |   |",
"|    |     (_)  |@@|  |   ||   |                       .'-'.      /_:_\\                        |   |",
"|    |     (_)  \\__/  |   ||   |   /-\\         /-\\      |:::|      )_:_(       {:}       {:}    |   |",
"|    |      _    U    |   ||   |  ( R )       ( F )     |:::|      |:._|       {S}       {M}    |   |",
"|    | [~@@~]  [<>< ] |   ||   |   \\_/         \\_/      '-.-'      `-.-'       {_}       {_}    |   |",
"|    | [====]  [====] |   ||   |  [====]     [=====]    [===]     [===]     [=====]     [===]  |",
"|    +-------(0)------+   ||   +---------------------------------------------------------------+   |",
"|    +-----+-----+-----+  ||   +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+       |",
"|    |     |     |     |  ||   |     |     |     |     |     |     |     |     |     |     |       |",
"|    +-----+-----+-----+  ||   +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+       |",
"|   +---------------------++-------------------------------------------------------------------+   |",
"|   |  THE HOT LINE (LEFT WING)                           THE HOT LINE (RIGHT WING)            |   |",
"|   |                                                                                          |   |",
"|   |   (WOK STATION 1)             ###################            (STOVE TOP)                 |   |",
"|   |                               #                 #                                        |   |",
"|   |       (  )                    #                 #             (  ) (  )                  |   |",
"|   |        )(                     #      THE        #              )(   )(                   |   |",
"|   |       (__)                    #      VOID       #             (__) (__)                  |   |",
"|   |      /    \\                   #                 #            /    \\ /    \\               |   |",
"|   |     |______|                  #                 #           |_____|_____|                |   |",
"|   |     [==FIRE]                  #                 #           [====GAS====]                |   |",
"|   |                               #                 #                                        |   |",
"|   |                               #                 #                                        |   |",
"|   |   (WOK STATION 2)             #                 #             (OVENS)                    |   |",
"|   |                               #                 #                                        |   |",
"|   |       (  )                    #                 #             [~~~~~]                    |   |",
"|   |        )(                     #                 #             [~~~~~]                    |   |",
"|   |       (__)                    #                 #             [__o__]                    |   |",
"|   |      /    \\                   #                 #              |     |                   |   |",
"|   |     |______|                  #                 #              |_____|                   |   |",
"|   |     [==FIRE]                  ###################              [HOT!!]                   |   |",
"|   |                                                                                          |   |",
"|   +------------------------------------------------------------------------------------------+   |",
"|          (WIDE CHEF'S ALLEY - DANGER ZONE)                                                       |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+               |",
"|    |     |     |     |     |     |     |     |     |     |     |     |     |     |               |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+               |",
"|    |     |     |     |     |     |     |     |     |     |     |     |     |     |               |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+               |",
"|    |     |     |     |     |     |     |     |     |     |     |     |     |     |               |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+               |",
"|    |     |     |     |     |     |     |     |     |     |     |     |     |     |               |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+               |",
"|   +-----------------------------------------------------+   +--------------------------------+   |",
"|   |  PREP STATION (STAINLESS STEEL)                     |   |  DISH PIT & WASHING            |   |",
"|   |                                                     |   |                                |   |",
"|   |    ___________       ___________       ___________  |   |    \\______/       [|||||||]    |   |",
"|   |   |___________}     |___________}     |___________} |   |     [ SINK ]       [PLATES ]    |   |",
"|   |    (Chopping)        (Plating)         (Saucing)    |   |     [______]       [|||||||]    |   |",
"|   |      _||_              (    )             _||_      |   |        |                         |   |",
"|   |      ( vvv)           (      )           ( @@@)     |   |        | ( ~~~ ~~~ ~~~ )         |   |",
"|   |      (Veg )           (Plate)            (Meat)     |   |        |                         |   |",
"|   +-----------------------------------------------------+   +-------|------------------------+   |",
"|                                                                     |                            |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+----+-----+-----+-----+-----+    |",
"|    |     |     |     |     |     |     |     |     |     |     |    |     |     |     |     |    |",
"|    +-----+-----+-----+-----+-----+-----+-----+-----+-----+-----+----+-----+-----+-----+-----+    v",
"|    |     |     |     |     |     |     |     |     |     |     |    |     |     |     |     |  (TO THE PIPE)",
"+---------------------------------------------------------------------|                            |"
];

// --- GAME STATE ---
let grid = [];
let player = { x: 7, y: 52, char: '@', steps: 0, grit: START_GRIT }; // Shifted start Y down
let gameOver = false;
let tickCount = 0;

// --- INITIALIZATION ---
function init() {
    // Parse map to 2D array
    grid = rawMap.map(row => row.split(''));
    
    // Controls
    document.addEventListener('keydown', handleInput);
    setupTouchControls();
    window.addEventListener('resize', fitScreen);
    
    // Start
    fitScreen();
    setInterval(gameLoop, TICK_RATE);
    render();
}

function fitScreen() {
    const wrapper = document.getElementById('game-wrapper');
    const container = document.getElementById('game-container');
    const width = container.offsetWidth;
    const height = container.offsetHeight;
    
    // Add extra padding calculation
    const scaleX = (window.innerWidth - 20) / width;
    const scaleY = (window.innerHeight - 80) / height;
    const scale = Math.min(scaleX, scaleY, 1.3); // Max scale 1.3 for desktop
    
    wrapper.style.transform = `scale(${scale})`;
    wrapper.style.marginTop = `${(window.innerHeight - (height * scale)) / 2}px`;
}

function setupTouchControls() {
    let tsX = 0, tsY = 0;
    document.addEventListener('touchstart', e => {
        tsx = e.changedTouches[0].screenX;
        tsY = e.changedTouches[0].screenY;
    }, {passive: false});
    
    document.addEventListener('touchend', e => {
        const teX = e.changedTouches[0].screenX;
        const teY = e.changedTouches[0].screenY;
        const dx = teX - tsX;
        const dy = teY - tsY;
        
        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 30) movePlayer(dx > 0 ? 1 : -1, 0);
        } else {
            if (Math.abs(dy) > 30) movePlayer(0, dy > 0 ? 1 : -1);
        }
    }, {passive: false});
}

// --- CORE MECHANICS ---
function handleInput(e) {
    if (gameOver) return;
    let dx = 0; let dy = 0;
    if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
    if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
    if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
    if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

    if (dx !== 0 || dy !== 0) {
        e.preventDefault();
        movePlayer(dx, dy);
    }
}

function movePlayer(dx, dy) {
    if (gameOver) return;
    
    const newX = player.x + dx;
    const newY = player.y + dy;
    const tile = getTile(newX, newY);
    
    // Collision Logic
    let isSolid = false;
    const solidChars = ['|', '+', '=', '[', ']', '{', '}', ')', '(', '/', '\\', '_', '.', ':', ';', '~', '-', 'p', 'q', "'", '?', '#'];
    
    if (solidChars.includes(tile)) isSolid = true;
    
    // Override Solid Zones (Walkable Floors)
    // 1. Chef's Alley (Center - Shifted Down)
    if (newY >= 48 && newY <= 59 && newX >= 5 && newX <= 88) isSolid = false;
    
    // 2. Fridge Entrance
    if (newY >= 21 && newY <= 24 && newX >= 5 && newX <= 30) isSolid = false;
    
    // 3. Dry Storage Entrance
    if (newY >= 21 && newY <= 24 && newX >= 35 && newX <= 90) isSolid = false;
    
    // 4. Bottom Area (Shifted Down)
    if (newY >= 60 && newY <= 67 && newX >= 5 && newX <= 92) isSolid = false;

    // Hard blocker for map edges and Void
    if (tile === '#' || tile === ' ') isSolid = true; 

    // Specific object blockers inside walkable zones
    if (tile === 'X' || tile === 'S' || tile === 'M') isSolid = true; // Crates/Sacks

    if (isSolid) return;

    // Hazard Check
    if (checkHazard(newX, newY)) {
        player.grit -= 5;
        updateStatus("OUCH! IT'S HOT!", "danger");
    } else {
        updateStatus("SNEAKING...", "safe");
    }

    player.x = newX;
    player.y = newY;
    player.steps++;
    
    // Grit decay on movement
    if (player.steps % MOVE_COST_RATE === 0) player.grit--;

    // Win Condition (Bottom Right Exit)
    if (newY >= 68 && newX >= 70) {
        gameOver = true;
        updateStatus("ESCAPED! LEVEL COMPLETE!", "safe");
        document.getElementById('game-container').style.borderColor = "#00ccff";
        document.body.style.backgroundColor = "#001122";
    }

    render();
}

function checkHazard(x, y) {
    // Fire/Heat Zones (Split vertical)
    const isRowHazard = (y >= 32 && y <= 34) || (y >= 42 && y <= 44);
    const isColHazard = (x < 35 || x > 60);

    if (isRowHazard && isColHazard) return true; 
    return false;
}

function gameLoop() {
    if (gameOver) return;
    tickCount++;
    
    if (player.grit <= 0) {
        player.grit = 0;
        gameOver = true;
        updateStatus("EXHAUSTED. CAUGHT.", "danger");
        document.getElementById('game-container').style.borderColor = "#ff3300";
    }
    
    // Periodic UI updates or idle animations could go here
    if (tickCount % 5 === 0) render(); // Re-render for animations even if not moving
}

function getTile(x, y) {
    if (y < 0 || y >= grid.length || x < 0 || x >= grid[0].length) return '#';
    return grid[y][x];
}

function updateStatus(msg, type) {
    const el = document.getElementById('status-display');
    const box = el.parentElement;
    el.innerText = msg;
    box.className = "stat-box " + (type || "");
    document.getElementById('grit-display').innerText = player.grit;
}

// --- RENDER ENGINE ---
function render() {
    // 1. Create a clean copy for display
    const dGrid = grid.map(row => [...row]); 

    // 2. Pre-process Static Coloring (Walls, Floors, Scanners)
    // We do this loop FIRST so we don't break HTML tags generated later
    for (let y = 0; y < dGrid.length; y++) {
        for (let x = 0; x < dGrid[y].length; x++) {
            let char = dGrid[y][x];
            
            // Skip processing if it's empty space
            if (char === ' ') continue;

            let colorClass = '';

            // Zone Scanners (Fridge & Storage)
            if (y >= 5 && y <= 19) {
                // Fridge Contents
                if (x >= 6 && x <= 22) {
                    if (['S','U','@','/','\\'].includes(char)) colorClass = 'meat';
                    else if (['?','|'].includes(char) && y < 8) colorClass = 'hook';
                    else if (['[',']','=','~'].includes(char)) colorClass = 'food';
                }
                // Dry Storage
                if (x >= 40 && x < 90) {
                    // Added 'm' and 'o' to lists to ensure proper coloring after swap
                    if (['R','F','/','\\','(',')','o'].includes(char)) colorClass = 'food';
                    else if (['.',':','|',"'",'m'].includes(char)) colorClass = 'bottle'; 
                    else if (['{','}','S','M'].includes(char)) colorClass = 'veg';
                    else if (['[',']','=','_'].includes(char)) colorClass = 'metal';
                }
            }

            // General Wall/Structure Coloring
            // We only color these if they haven't been colored by a scanner yet
            if (!colorClass) {
                if (char === '+' || char === '|' || char === '-') colorClass = 'wall';
                else if (char === '.') colorClass = 'floor';
                else if (char === '#') colorClass = 'void'; // The Void
            }

            if (colorClass) {
                dGrid[y][x] = `<span class="${colorClass}">${char}</span>`;
            }
        }
    }

    // 3. Inject Entities (Player)
    // We do this before string joining so the player is strictly at coordinate x,y
    dGrid[player.y][player.x] = `<span class="player">@</span>`;
    
    // Inject Dynamic Drain Pipe (Bottom Right)
    for(let i=60; i<=67; i++) {
        if(dGrid[i][70] && dGrid[i][70].includes('|')) {
            dGrid[i][70] = `<span class="drain-pipe">|</span>`;
        }
    }

    // 4. Flatten to String
    let output = dGrid.map(row => row.join('')).join('\n');

    // 5. Post-Process Special Animations (Phrase Replacement)
    // These replace specific text patterns with complex HTML animations.
    // Since we only colored single chars in step 2, these multi-char patterns 
    // should mostly be intact (unless they contained Walls, which we must be careful of).
    
    // Fire & Heat
    output = output.replace(/\[==FIRE\]/g, '<span class="fire"></span>');
    output = output.replace(/\[====GAS====\]/g, '<span class="gas"></span>');
    output = output.replace(/\[HOT!!\]/g, '<span class="heat"></span>');

    // Prep Stations
    output = output.replace(/_\|\|_/g, '<span class="chop">_||_</span>');
    output = output.replace(/\( @@@\)/g, '(<span class="sauce-anim"> @@@</span>)');
    
    // Smoke
    // We use a global replace for the smoke puffs
    output = output.replace(/\(  \)/g, '<span class="smoke-anim">(  )</span>');
    output = output.replace(/\)\(/g, '<span class="smoke-anim">)(</span>');

    // Water
    output = output.replace(/\( ~~~ ~~~ ~~~ \)/g, '<span class="water-leak"></span>');

    // Labels
    output = output.replace(/\(VEG\)/g, '<span class="veg">(VEG)</span>');
    output = output.replace(/\(MEAT\)/g, '<span class="meat">(MEAT)</span>');
    
    document.getElementById('game-stage').innerHTML = output;
}

init();
</script>
</body>
</html>
